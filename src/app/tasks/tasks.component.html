@if(isAddingTask) {
  <!--<app-new-task [user]="user" (cancel)="onCancelAddTask()" (add)="onAddTask($event)" />-->
  <app-new-task [user]="user" (close)="onCloseAddTask()" />  
} @else {
<section id="tasks">
  <header>
    <h2>{{user.name}}'s Tasks</h2>
    <menu>
      <button (click)="onStartNewTask()">Add Task</button>
    </menu>
  </header>
  
  <ul>
  @for(t of userTasks; track t.id) {
  <li>
    <!--<app-task [task]="t" (complete)="onCompleteTask($event)" />-->
    <app-task [task]="t" />
  </li>
  }
  </ul>
</section>
}
