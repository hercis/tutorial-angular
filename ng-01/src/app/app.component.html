<app-header></app-header>
<main>
  <ul id="users">
    @for(u of users; track u.id) {
    <li>
      <app-user [user]="u"
        [selected]="selectedUserId === u.id"
        (select)="onSelectUser($event)" />
    </li>
    }
  </ul>

  @if(selectedUser) {
  <app-tasks [user]="selectedUser"/>
  } @else {
  <p id="fallback">Select a user to see their tasks!</p>
  }
</main>
